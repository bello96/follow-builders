<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Builders Digest</title>
<style>
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; max-width: 760px; margin: 0 auto; padding: 24px; color: #1a1a1a; background: #fafafa; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #666; margin-top: 0; }
  section { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin: 16px 0; }
  label { display: block; font-size: 14px; color: #374151; margin-bottom: 8px; font-weight: 600; }
  .keyrow { display: flex; gap: 8px; }
  #keyInput { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
  button { font-size: 15px; padding: 8px 18px; border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  #saveKey { background: #059669; }
  #keyStatus { font-size: 13px; margin-top: 8px; }
  .ok { color: #059669; }
  .warn { color: #d97706; }
  .err { color: #dc2626; }
  #go { font-size: 16px; padding: 12px 24px; width: 100%; }
  #status { margin: 14px 0; color: #666; font-size: 14px; }
  #result { line-height: 1.7; display: none; }
  #result a { color: #2563eb; word-break: break-all; }
  #copy { display: none; margin-top: 12px; background: #fff; color: #374151; border: 1px solid #d1d5db; }
  details summary { cursor: pointer; font-weight: 600; color: #374151; }
  .hint { font-size: 12px; color: #9ca3af; margin-top: 6px; line-height: 1.5; }
  /* 信息源勾选清单 */
  .srcgroup { margin-top: 14px; }
  .srchead { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; margin-bottom: 0; }
  .srchead input { width: auto; margin: 0; }
  .srchead .grptitle { font-size: 14px; font-weight: 600; color: #374151; }
  .srcitems { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 3px 14px; margin-top: 8px; }
  .srcitem { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 400; color: #374151; margin: 0; }
  .srcitem input { width: auto; margin: 0; }
  .srcitem .handle { color: #9ca3af; }
</style>
</head>
<body>
  <h1>📡 AI Builders Digest</h1>
  <p class="sub">追踪 AI 顶尖建造者，一键生成中文摘要（X 动态 / 官方博客 / 播客）。</p>

  <section>
    <label>🔑 你的 DeepSeek API Key</label>
    <div class="keyrow">
      <input id="keyInput" type="password" placeholder="sk-..." autocomplete="off" />
      <button id="saveKey">保存</button>
    </div>
    <div id="keyStatus"></div>
    <p class="hint">Key 只存在你这台浏览器里，生成时直接发给 DeepSeek，不经过本站服务器、也不上传任何地方。可在 platform.deepseek.com 获取。</p>
  </section>

  <section>
    <button id="go">生成今日 AI 汇总</button>
    <div id="status"></div>
    <div id="result"></div>
    <button id="copy">复制全文</button>
  </section>

  <section>
    <details id="sources" open>
      <summary>📋 信息源（勾选纳入摘要的来源）</summary>
      <div id="sourcesContent">加载中…</div>
    </details>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const BASE = 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main';
    const PROMPT_FILES = { digest_intro: 'digest-intro.md', summarize_tweets: 'summarize-tweets.md', summarize_podcast: 'summarize-podcast.md', summarize_blogs: 'summarize-blogs.md', translate: 'translate.md' };
    const KEY_STORE = 'fb_deepseek_key';
    const SOURCES_STORE = 'fb_selected_sources';
    // 生成参数固定为最优组合，不在页面暴露：最强模型 + 充足输出 + 稳健温度 + 较长超时。
    const GEN = { model: 'deepseek-v4-pro', temperature: 0.6, maxTokens: 32768, timeoutSec: 120 };
    const $ = (id) => document.getElementById(id);
    let raw = '';
    let sources = { x_accounts: [], podcasts: [], blogs: [] };

    const escHtml = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    // ---- Key 配置 ----
    function loadKey() {
      const k = localStorage.getItem(KEY_STORE);
      if (k) {
        $('keyInput').value = k;
        $('keyStatus').innerHTML = '<span class="ok">✓ 已配置（保存在本浏览器）</span>';
      } else {
        $('keyStatus').innerHTML = '<span class="warn">尚未配置，请先填入 key 再生成</span>';
      }
    }
    $('saveKey').addEventListener('click', () => {
      const k = $('keyInput').value.trim();
      if (!k) { $('keyStatus').innerHTML = '<span class="err">key 不能为空</span>'; return; }
      localStorage.setItem(KEY_STORE, k);
      $('keyStatus').innerHTML = '<span class="ok">✓ 已保存到本浏览器</span>';
    });

    // ---- 信息源勾选 ----
    function loadStoredSelection() {
      try { return JSON.parse(localStorage.getItem(SOURCES_STORE)); }
      catch { return null; }
    }
    // 勾选判定：首次访问（无记录）或该组从未保存过 → 默认勾选；否则按已保存的选中列表。
    function isChecked(stored, group, id) {
      if (!stored || !Array.isArray(stored[group])) { return true; }
      return stored[group].includes(id);
    }
    // 以当前复选框状态为准，构造 { x, podcasts, blogs } 选中 id 列表。
    function currentSelection() {
      const sel = { x: [], podcasts: [], blogs: [] };
      document.querySelectorAll('#sourcesContent input[type=checkbox][data-group]').forEach((cb) => {
        if (cb.checked) { sel[cb.dataset.group].push(cb.dataset.id); }
      });
      return sel;
    }
    function saveSelection() {
      localStorage.setItem(SOURCES_STORE, JSON.stringify(currentSelection()));
    }
    // 根据该组各项勾选情况，更新「全选」主复选框：全勾→选中，全不勾→未选，部分→半选。
    function updateMaster(group) {
      const master = document.querySelector(`#sourcesContent input[data-master="${group}"]`);
      if (!master) { return; }
      const items = [...document.querySelectorAll(`#sourcesContent input[type=checkbox][data-group="${group}"]`)];
      const checkedCount = items.filter((c) => c.checked).length;
      master.checked = items.length > 0 && checkedCount === items.length;
      master.indeterminate = checkedCount > 0 && checkedCount < items.length;
    }
    function renderGroup(title, group, items, stored) {
      const head = `<label class="srchead"><input type="checkbox" data-master="${group}"/>`
        + ` <span class="grptitle">${escHtml(title)}（${items.length}）</span></label>`;
      const body = items.map((it) => {
        const checked = isChecked(stored, group, it.id) ? 'checked' : '';
        const sub = it.sub ? ` <span class="handle">${escHtml(it.sub)}</span>` : '';
        return `<label class="srcitem"><input type="checkbox" data-group="${group}" data-id="${escHtml(it.id)}" ${checked}/>`
          + ` <span>${escHtml(it.label)}</span>${sub}</label>`;
      }).join('');
      return `<div class="srcgroup">${head}<div class="srcitems">${body}</div></div>`;
    }
    async function loadSources() {
      try {
        const s = await fetch(`${BASE}/config/default-sources.json`).then((r) => r.json());
        sources = { x_accounts: s.x_accounts || [], podcasts: s.podcasts || [], blogs: s.blogs || [] };
        const stored = loadStoredSelection();
        const xItems = sources.x_accounts.filter((a) => a.handle).map((a) => ({ id: a.handle, label: a.name || a.handle, sub: '@' + a.handle }));
        const podItems = sources.podcasts.filter((p) => p.name).map((p) => ({ id: p.name, label: p.name }));
        const blogItems = sources.blogs.filter((b) => b.name).map((b) => ({ id: b.name, label: b.name }));
        $('sourcesContent').innerHTML =
          renderGroup('X / Twitter 建造者', 'x', xItems, stored)
          + renderGroup('播客', 'podcasts', podItems, stored)
          + renderGroup('官方博客', 'blogs', blogItems, stored);
        ['x', 'podcasts', 'blogs'].forEach(updateMaster);
        // 把首次访问的「默认全选」落为具体记录，便于后续按记录判定。
        saveSelection();
      } catch (e) {
        $('sourcesContent').innerHTML = '<span class="err">源列表加载失败：' + escHtml(e.message) + '</span>';
      }
    }
    // 事件委托：主复选框切换全组；单项变化则回写主复选框状态；任何变化都即时保存。
    $('sourcesContent').addEventListener('change', (e) => {
      const t = e.target;
      if (t.matches('input[type=checkbox][data-master]')) {
        t.indeterminate = false;
        document.querySelectorAll(`#sourcesContent input[type=checkbox][data-group="${t.dataset.master}"]`).forEach((cb) => { cb.checked = t.checked; });
        saveSelection();
      } else if (t.matches('input[type=checkbox][data-group]')) {
        updateMaster(t.dataset.group);
        saveSelection();
      }
    });

    // ---- 生成（前端直连 DeepSeek）----
    function filterFeeds(feeds, selection) {
      return {
        x: (feeds.x || []).filter((b) => !!b.handle && selection.x.includes(b.handle)),
        podcasts: (feeds.podcasts || []).filter((p) => !!p.name && selection.podcasts.includes(p.name)),
        blogs: (feeds.blogs || []).filter((b) => !!b.name && selection.blogs.includes(b.name)),
      };
    }

    function formatFeedContent(feeds) {
      const parts = ['===TWEETS==='];
      for (const b of feeds.x || []) {
        parts.push(`\n## ${b.name || ''} (@${b.handle || ''})`);
        if (b.bio) { parts.push(`BIO: ${b.bio}`); }
        for (const t of b.tweets || []) {
          parts.push(`- ${(t.text || '').replace(/\s+/g, ' ').trim()}`);
          parts.push(`  URL: ${t.url || ''}`);
        }
      }
      parts.push('\n\n===BLOGS===');
      for (const b of feeds.blogs || []) {
        parts.push(`\n## ${b.source || b.name || ''}: ${b.title || ''}`);
        parts.push(`URL: ${b.url || ''}`);
        parts.push(`BODY:\n${b.content || b.description || ''}`);
      }
      parts.push('\n\n===PODCAST===');
      for (const p of feeds.podcasts || []) {
        parts.push(`\n## ${p.name || ''}: ${p.title || ''}`);
        parts.push(`URL: ${p.url || ''}`);
        parts.push(`TRANSCRIPT:\n${p.transcript || ''}`);
      }
      return parts.join('\n');
    }

    function buildMessages(feeds, prompts, dateStr) {
      const system = [
        '你是 AI 行业资讯的中文编辑。严格依据提供的原始内容做混编摘要，不得编造，每条必须保留原始链接。',
        '输出整份简体中文 digest。遵循以下规则：',
        '\n## 整体格式\n' + prompts.digest_intro,
        '\n## 推文摘要\n' + prompts.summarize_tweets,
        '\n## 博客摘要\n' + prompts.summarize_blogs,
        '\n## 播客混编\n' + prompts.summarize_podcast,
        '\n## 中文风格\n' + prompts.translate,
        `\n标题用："AI Builders Digest · ${dateStr}"。顺序：X / Twitter、官方博客、播客。结尾加一行："通过 Follow Builders 生成"。不要使用破折号。`,
      ].join('\n');
      const user = '以下是今天的原始 feed 内容，请据此生成中文 digest：\n\n' + formatFeedContent(feeds);
      return [{ role: 'system', content: system }, { role: 'user', content: user }];
    }

    async function generate() {
      const key = localStorage.getItem(KEY_STORE);
      if (!key) {
        $('status').className = 'err';
        $('status').textContent = '请先在上方填入你的 DeepSeek API Key 并点「保存」。';
        return;
      }
      const selection = currentSelection();
      if (!selection.x.length && !selection.podcasts.length && !selection.blogs.length) {
        $('status').className = 'err';
        $('status').textContent = '请至少选择一个信息源（在下方「信息源」里勾选）。';
        return;
      }
      $('go').disabled = true; $('copy').style.display = 'none'; $('result').style.display = 'none';
      $('status').className = ''; $('status').textContent = '正在抓取最新内容…';
      const controller = new AbortController();
      let timer = 0;
      try {
        const [fx, fp, fb] = await Promise.all([
          fetch(`${BASE}/feed-x.json`).then((r) => r.json()),
          fetch(`${BASE}/feed-podcasts.json`).then((r) => r.json()),
          fetch(`${BASE}/feed-blogs.json`).then((r) => r.json()),
        ]);
        const promptEntries = await Promise.all(
          Object.entries(PROMPT_FILES).map(async ([k, f]) => [k, await fetch(`${BASE}/prompts/${f}`).then((r) => r.text())]),
        );
        const prompts = Object.fromEntries(promptEntries);
        const allFeeds = { x: fx.x || [], podcasts: fp.podcasts || [], blogs: fb.blogs || [] };
        const feeds = filterFeeds(allFeeds, selection);
        const dateStr = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        const messages = buildMessages(feeds, prompts, dateStr);

        $('status').textContent = `正在请 DeepSeek（${GEN.model}）生成中文摘要…（最长等待 ${GEN.timeoutSec} 秒）`;
        timer = setTimeout(() => controller.abort(), GEN.timeoutSec * 1000);
        const res = await fetch('https://api.deepseek.com/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
          body: JSON.stringify({ model: GEN.model, messages, temperature: GEN.temperature, max_tokens: GEN.maxTokens, stream: false }),
          signal: controller.signal,
        });
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`DeepSeek 返回 ${res.status}：${errText.slice(0, 200)}`);
        }
        const data = await res.json();
        raw = data.choices?.[0]?.message?.content || '';
        if (!raw) { throw new Error('DeepSeek 返回了空内容'); }
        $('result').innerHTML = marked.parse(raw);
        $('result').style.display = 'block';
        $('copy').style.display = 'inline-block';
        $('status').textContent = '生成完成 · ' + new Date().toLocaleString('zh-CN');
      } catch (e) {
        $('status').className = 'err';
        if (e.name === 'AbortError') {
          $('status').textContent = `生成超时（超过 ${GEN.timeoutSec} 秒），请稍后重试。`;
        } else {
          $('status').textContent = '出错了：' + e.message;
        }
      } finally {
        if (timer) { clearTimeout(timer); }
        $('go').disabled = false;
      }
    }

    $('go').addEventListener('click', generate);
    $('copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText(raw);
      $('copy').textContent = '已复制 ✓';
      setTimeout(() => ($('copy').textContent = '复制全文'), 1500);
    });

    loadKey();
    loadSources();
  </script>
</body>
</html>
